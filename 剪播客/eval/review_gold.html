function initReviewState() {
  allSentenceIndices = [];
  for (var i = 0; i < goldData.sentences.length; i++) {
    var s = goldData.sentences[i];
    allSentenceIndices.push(s.sentenceIdx);
    var hasEdits = s.expectedEdits && s.expectedEdits.length > 0;
    reviewState[s.sentenceIdx] = {
      edits: (s.expectedEdits || []).map(function(e) { return Object.assign({}, e, {status: 'pending'}); }),
      falsePositives: s.falsePositives || [],
      speaker: s.speaker,
      fullSentence: s.fullSentence,
      audioSource: s.audioSource,
      sentenceStatus: hasEdits ? 'has_edits' : 'unreviewed'
    };
  }
}

function populateSourceFilter() {
  var sources = {};
  for (var i = 0; i < goldData.sentences.length; i++) {
    sources[goldData.sentences[i].audioSource || 'unknown'] = true;
  }
  var sel = document.getElementById('filterSource');
  Object.keys(sources).sort().forEach(function(src) {
    var opt = document.createElement('option');
    opt.value = src;
    opt.textContent = src.length > 40 ? src.slice(0, 40) + '...' : src;
    sel.appendChild(opt);
  });
}

function applyFilter() {
  var typeFilter = document.getElementById('filterType').value;
  var sourceFilter = document.getElementById('filterSource').value;
  filteredIndices = [];
  for (var j = 0; j < allSentenceIndices.length; j++) {
    var idx = allSentenceIndices[j];
    var state = reviewState[idx];
    if (!state) continue;
    if (sourceFilter !== 'all' && state.audioSource !== sourceFilter) continue;
    if (typeFilter === 'all') { filteredIndices.push(idx); }
    else if (typeFilter === 'has_edits') { if (state.edits.length > 0) filteredIndices.push(idx); }
    else if (typeFilter === 'no_edits') { if (state.edits.length === 0) filteredIndices.push(idx); }
    else if (typeFilter === 'pending') {
      if (state.edits.some(function(e){return e.status==='pending';}) || state.sentenceStatus === 'unreviewed') filteredIndices.push(idx);
    } else {
      if (state.edits.some(function(e){return e.type===typeFilter;})) filteredIndices.push(idx);
    }
  }
  currentPage = 0;
  render();
}

  for (var i = start; i < end; i++) html += renderCard(filteredIndices[i]);
  document.getElementById('cards').innerHTML = html || '<div class="card"><p style="color:#999;text-align:center;">没有匹配的句子</p></div>';
  var totalPages = Math.ceil(filteredIndices.length / PAGE_SIZE) || 1;
  var info = '第 ' + (currentPage + 1) + '/' + totalPages + ' 页 (' + filteredIndices.length + ' 条)';
  document.getElementById('pageInfo').textContent = info;
  document.getElementById('pageInfo2').textContent = info;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = end >= filteredIndices.length;
  updateGlobalStats();
}

function updateGlobalStats() {
  var approved=0, rejected=0, modified=0, pending=0, added=0;
  var totalSentences = allSentenceIndices.length, reviewedSentences = 0;
  for (var j = 0; j < allSentenceIndices.length; j++) {
    var state = reviewState[allSentenceIndices[j]];
    if (!state) continue;
    for (var k = 0; k < state.edits.length; k++) {
      var st = state.edits[k].status;
      if (st==='approved') approved++; else if (st==='rejected') rejected++;
      else if (st==='modified') modified++; else if (st==='added') added++; else pending++;
    }
    if (state.sentenceStatus === 'clean' || (state.edits.length > 0 && state.edits.every(function(e){return e.status!=='pending';}))) reviewedSentences++;
  }
  document.getElementById('globalStats').innerHTML = '句子: '+reviewedSentences+'/'+totalSentences+' 已审 | ✅'+approved+' ❌'+rejected+' ✏️'+modified+' ➕'+added+' ⏳'+pending;
  document.getElementById('progressFill').style.width = (totalSentences>0?(reviewedSentences/totalSentences*100):0)+'%';
}

function renderCard(idx) {
  var state = reviewState[idx];
  if (!state) return '';
  var sentence = state.fullSentence || '';
  var hasEdits = state.edits.length > 0;
  var activeEdits = state.edits.filter(function(e){return e.status!=='rejected';});
  var ctx = contextData[idx] || {};
  var allDone = hasEdits && state.edits.every(function(e){return e.status!=='pending';});
  var statusClass = hasEdits ? (allDone ? 'status-approved' : '') : (state.sentenceStatus==='clean' ? 'status-clean' : '');

  var h = '<div class="card '+(hasEdits?'':'no-edit')+' '+statusClass+'">';
  h += '<div class="card-header"><span style="font-weight:600;">S'+idx;
  if (hasEdits) {
    h += allDone ? ' <span class="sentence-status ss-done">✓已审</span>' : ' <span class="sentence-status ss-has-edits">'+state.edits.length+'个标注</span>';
  } else {
    h += state.sentenceStatus==='clean' ? ' <span class="sentence-status ss-clean">✓clean</span>' : ' <span class="sentence-status" style="background:#f5f5f5;color:#bbb;">无标注</span>';
  }
  h += '</span><span class="card-meta">'+esc(state.speaker||'')+' | '+esc((state.audioSource||'').replace(/.*[\/\\]/,'').slice(0,30))+'</span></div>';

  if (ctx.prev && ctx.prev.text) h += '<div class="context-line"><span class="ctx-label">上句</span><span class="ctx-speaker">['+esc(ctx.prev.speaker||'')+']</span>'+esc(ctx.prev.text)+'</div>';
  h += '<div class="sentence" data-idx="'+idx+'">'+(hasEdits ? hlDel(sentence,activeEdits) : esc(sentence))+'</div>';
  if (ctx.next && ctx.next.text) h += '<div class="context-line"><span class="ctx-label">下句</span><span class="ctx-speaker">['+esc(ctx.next.speaker||'')+']</span>'+esc(ctx.next.text)+'</div>';

  if (activeEdits.length > 0) {
    // Build after text using offset-aware deletion
    var delRanges = [];
    var wholeDelete = false;
    for (var i=0;i<activeEdits.length;i++) {
      if (activeEdits[i].text==='') { wholeDelete=true; break; }
      if (!activeEdits[i].text) continue;
      var dPos = -1;
      if (typeof activeEdits[i].textOffset === 'number' && activeEdits[i].textOffset >= 0) {
        var tp = activeEdits[i].textOffset;
        if (sentence.slice(tp, tp+activeEdits[i].text.length) === activeEdits[i].text) dPos=tp;
        else dPos = sentence.indexOf(activeEdits[i].text);
      } else { dPos = sentence.indexOf(activeEdits[i].text); }
      if (dPos>=0) delRanges.push([dPos, dPos+activeEdits[i].text.length]);
    }
    var after;
    if (wholeDelete) { after='【整句删除】'; }
    else {
      delRanges.sort(function(a,b){return a[0]-b[0];});
      after=''; var last=0;
      for (var i=0;i<delRanges.length;i++) {
        if (delRanges[i][0]<last) continue;
        after += sentence.slice(last, delRanges[i][0]);
        last = delRanges[i][1];
      }
      after += sentence.slice(last);
    }
    h += '<div class="after" style="margin-top:8px;">→ '+esc(after)+'</div>';
  }

  if (hasEdits) {
    h += '<div class="edits-list">';
    for (var i=0;i<state.edits.length;i++) {
      var e = state.edits[i];
      h += '<div class="edit-item '+(e.status==='rejected'?'rejected':'')+'">';
      h += '<span class="type-badge type-'+e.type+'">'+e.type+'</span>';
      h += '<span class="edit-text" title="'+esc(e.text||'整句')+'">"'+esc((e.text||'【整句】').slice(0,50))+'"</span>';
      if (e.reason) h += '<span style="font-size:11px;color:#888;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+esc(e.reason)+'">'+esc(e.reason.slice(0,25))+'</span>';
      h += '<div class="edit-actions">';
      h += '<button class="btn-approve '+(e.status==='approved'?'selected':'')+'" onclick="setStatus('+idx+','+i+',\'approved\')">✓</button>';
      h += '<button class="btn-reject '+(e.status==='rejected'?'selected':'')+'" onclick="setStatus('+idx+','+i+',\'rejected\')">✗</button>';
      h += '<button onclick="openEditModal('+idx+','+i+')" title="修改">✏️</button>';
      h += '</div></div>';
    }
    h += '</div>';
  }

  if (!hasEdits && state.sentenceStatus!=='clean') {
    h += '<div style="display:flex;gap:8px;margin-top:6px;"><button onclick="markClean('+idx+')" style="padding:4px 12px;font-size:12px;border:1px solid #4caf50;border-radius:4px;background:#e8f5e9;color:#2e7d32;cursor:pointer;">✓ 确认无需编辑</button><div class="add-edit" onclick="openAddModal('+idx+')" style="flex:1;">+ 手动添加</div></div>';
  } else {
    h += '<div class="add-edit" onclick="openAddModal('+idx+')">+ 手动添加</div>';
  }
  return h + '</div>';
}

function hlDel(sentence, edits) {
  if (!sentence) return '';
  var ranges = [];
  for (var i=0;i<edits.length;i++) {
    if (edits[i].text==='') return '<span class="del">'+esc(sentence)+'</span>';
    if (!edits[i].text) continue;
    var pos = -1;
    if (typeof edits[i].textOffset === 'number' && edits[i].textOffset >= 0) {
      // Use exact offset if available
      var tryPos = edits[i].textOffset;
      if (sentence.slice(tryPos, tryPos + edits[i].text.length) === edits[i].text) {
        pos = tryPos;
      } else { pos = sentence.indexOf(edits[i].text); }
    } else {
      pos = sentence.indexOf(edits[i].text);
    }
    if (pos>=0) ranges.push([pos, pos+edits[i].text.length, edits[i].type]);
  }
  ranges.sort(function(a,b){return a[0]-b[0];});
  var r='', last=0;
  for (var i=0;i<ranges.length;i++) {
    if (ranges[i][0]<last) continue;
    r += esc(sentence.slice(last, ranges[i][0]));
    r += '<span class="del" title="'+ranges[i][2]+'">'+esc(sentence.slice(ranges[i][0], ranges[i][1]))+'</span>';
    last = ranges[i][1];
  }
  return r + esc(sentence.slice(last));
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

// ===== Text selection quick add =====
document.addEventListener('mouseup', function(ev) {
  var popup = document.getElementById('selPopup');
  if (popup.contains(ev.target)) return;
  var sel = window.getSelection();
  var text = sel.toString().trim();
  if (!text) { popup.style.display='none'; return; }
  var node = sel.anchorNode;
  var sentDiv = null;
  while (node && node !== document.body) {
    if (node.nodeType===1 && node.classList && node.classList.contains('sentence') && node.dataset.idx) { sentDiv=node; break; }
    node = node.parentNode;
  }
  if (!sentDiv) { popup.style.display='none'; return; }
  selTargetIdx = parseInt(sentDiv.dataset.idx);
  selText = text;
  // Calculate character offset within sentence textContent
  var range = sel.getRangeAt(0);
  try {
    var preRange = document.createRange();
    preRange.setStart(sentDiv, 0);
    preRange.setEnd(range.startContainer, range.startOffset);
    selOffset = preRange.toString().length;
  } catch(ex) { selOffset = -1; }
  var rect = range.getBoundingClientRect();
  var px = rect.left + rect.width/2 - 100;
  var py = rect.bottom + 8;
  if (px<10) px=10;
  if (px > window.innerWidth-220) px = window.innerWidth-220;
  if (py > window.innerHeight-120) py = rect.top-120;
  document.getElementById('selPreview').textContent = '"'+(text.length>40 ? text.slice(0,40)+'...' : text)+'"';
  popup.style.left = px+'px'; popup.style.top = py+'px'; popup.style.display = 'block';
});
document.addEventListener('mousedown', function(ev) {
  var popup = document.getElementById('selPopup');
  if (!popup.contains(ev.target)) popup.style.display = 'none';
});

function quickAdd(type) {
  if (selTargetIdx===null || !selText) return;
  var state = reviewState[selTargetIdx];
  if (!state) return;
  var editObj = {text:selText, type:type, reason:'划选添加', status:'added'};
  if (selOffset >= 0) editObj.textOffset = selOffset;
  state.edits.push(editObj);
  if (state.sentenceStatus==='unreviewed'||state.sentenceStatus==='clean') state.sentenceStatus='has_edits';
  document.getElementById('selPopup').style.display='none';
  window.getSelection().removeAllRanges();
  autoSave(); render();
}

// ===== Actions =====
function setStatus(idx,ei,status) {
  var e = reviewState[idx].edits[ei];
  e.status = e.status===status ? 'pending' : status;
  autoSave(); render();
}
function markClean(idx) { reviewState[idx].sentenceStatus='clean'; autoSave(); render(); }
function markAllClean() {
  var s=currentPage*PAGE_SIZE, e=Math.min(s+PAGE_SIZE,filteredIndices.length);
  for (var i=s;i<e;i++) { var st=reviewState[filteredIndices[i]]; if(st&&st.edits.length===0&&st.sentenceStatus!=='clean') st.sentenceStatus='clean'; }
  autoSave(); render();
}
function approveAllVisible() {
  var s=currentPage*PAGE_SIZE, e=Math.min(s+PAGE_SIZE,filteredIndices.length);
  for (var i=s;i<e;i++) {
    var st=reviewState[filteredIndices[i]]; if(!st) continue;
    st.edits.forEach(function(ed){if(ed.status==='pending')ed.status='approved';});
    if(st.edits.length===0&&st.sentenceStatus!=='clean') st.sentenceStatus='clean';
  }
  autoSave(); render();
}
function jumpTo() {
  var val=document.getElementById('jumpIdx').value.replace(/\D/g,'');
  if(!val) return;
  var t=parseInt(val), pos=filteredIndices.indexOf(t);
  if(pos>=0) { currentPage=Math.floor(pos/PAGE_SIZE); render(); setTimeout(function(){var c=document.querySelectorAll('.card');var ci=pos-currentPage*PAGE_SIZE;if(c[ci])c[ci].scrollIntoView({behavior:'smooth',block:'center'});},100); }
  else alert('S'+t+' 不在当前筛选中');
}
function openAddModal(idx) { addTargetIdx=idx; document.getElementById('newText').value=''; document.getElementById('newReason').value=''; document.getElementById('addModal').classList.add('show'); }
function closeModal() { document.getElementById('addModal').classList.remove('show'); }
function confirmAdd() {
  var text=document.getElementById('newText').value.trim(), type=document.getElementById('newType').value, reason=document.getElementById('newReason').value.trim();
  var state=reviewState[addTargetIdx];
  state.edits.push({text:text, type:type, reason:reason||'人工添加', status:'added'});
  if(state.sentenceStatus==='unreviewed'||state.sentenceStatus==='clean') state.sentenceStatus='has_edits';
  closeModal(); autoSave(); render();
}
function openEditModal(idx,ei) {
  editTargetIdx=idx; editTargetEditIdx=ei;
  var e=reviewState[idx].edits[ei];
  document.getElementById('editText').value=e.text||'';
  document.getElementById('editType').value=e.type;
  document.getElementById('editModal').classList.add('show');
}
function closeEditModal() { document.getElementById('editModal').classList.remove('show'); }
function confirmEdit() {
  var e=reviewState[editTargetIdx].edits[editTargetEditIdx];
  e.text=document.getElementById('editText').value.trim();
  e.type=document.getElementById('editType').value;
  e.status='modified';
  closeEditModal(); autoSave(); render();
}
function nextPage() { if((currentPage+1)*PAGE_SIZE<filteredIndices.length){currentPage++;render();window.scrollTo(0,0);} }
function prevPage() { if(currentPage>0){currentPage--;render();window.scrollTo(0,0);} }

function autoSave() {
  try {
    var d={};
    for (var idx in reviewState) {
      var s=reviewState[idx];
      if (s.sentenceStatus==='clean' || s.edits.some(function(e){return e.status!=='pending';})) {
        d[idx]={edits:s.edits.map(function(e){return {text:e.text,type:e.type,reason:e.reason,status:e.status};}), sentenceStatus:s.sentenceStatus};
      }
    }
    localStorage.setItem('gold_review_state', JSON.stringify(d));
  } catch(e){}
}
function loadSavedState() {
  try {
    var saved=JSON.parse(localStorage.getItem('gold_review_state')||'{}');
    for (var idx in saved) {
      var state=reviewState[idx]; if(!state) continue;
      if(saved[idx].sentenceStatus) state.sentenceStatus=saved[idx].sentenceStatus;
      if(saved[idx].edits) {
        for(var i=0;i<Math.min(saved[idx].edits.length,state.edits.length);i++) {
          state.edits[i].status=saved[idx].edits[i].status||'pending';
          if(saved[idx].edits[i].type) state.edits[i].type=saved[idx].edits[i].type;
          if(saved[idx].edits[i].text!==undefined) state.edits[i].text=saved[idx].edits[i].text;
        }
        for(var i=state.edits.length;i<saved[idx].edits.length;i++) state.edits.push(saved[idx].edits[i]);
      }
    }
  } catch(e){}
}
function exportGold() {
  var cleaned=Object.assign({},goldData);
  cleaned.sentences=goldData.sentences.map(function(s){
    var st=reviewState[s.sentenceIdx]; if(!st) return s;
    var ne=st.edits.filter(function(e){return e.status!=='rejected';}).map(function(e){var o=Object.assign({},e);delete o.status;return o;});
    return Object.assign({},s,{expectedEdits:ne});
  }).filter(function(s){return s.expectedEdits.length>0||(s.falsePositives&&s.falsePositives.length>0);});
  cleaned.reviewedAt=new Date().toISOString();
  var blob=new Blob([JSON.stringify(cleaned,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='eval_gold_reviewed.json'; a.click();
}
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  if(e.key==='ArrowRight'||e.key==='n') nextPage();
  if(e.key==='ArrowLeft'||e.key==='p') prevPage();
  if(e.key==='a') approveAllVisible();
  if(e.key==='Escape') document.getElementById('selPopup').style.display='none';
});

</script>
</body>
