# 默认偏好模板 —— user_manager.js create <userId> 会克隆此目录
# 字段为空 / target_minutes=0 时，check 会判定 needsOnboarding=true，触发对话引导填写
meta:
  version: "1.0"
  created_at: ""
  last_updated: ""

# 节目画像（audience + purpose + duration.target_minutes 三者非空才算配置完成）
audience: ""        # 受众，例：关注心理成长的年轻听众
purpose: ""         # 节目目的，例：两位主播轻松对谈，分享生活感悟

duration:
  target_minutes: 0          # 目标时长（分钟），>0 才算配置完成
  aggressiveness: "moderate" # conservative(删10-20%) / moderate(删20-35%) / aggressive(删35-50%)

# 阶段1.3 粗剪：段落级内容删除
content_analysis:
  enabled: true
  detect_types:              # 各删除类型开关（true=启用检测）
    pre_show: true           # 录前准备
    tech_debug: true         # 技术调试
    chit_chat: true          # 跑题闲聊
    privacy: true            # 隐私信息
    repeated_content: true   # 重复内容
    production_talk: true    # 制作讨论

# 阶段1.4 精剪：词/句级口癖删除（填充词、卡顿、静音、重说纠正等）
technical:
  enabled: true

# 流程自动化（false=每步停下让用户确认）
workflow_automation:
  auto_qa_enabled: false        # 剪辑后自动触发 /podcastcut-质检
  auto_post_production: false   # 自动触发 /podcastcut-后期
